    TECH STACK: Leaflet.js, Custom SVG Pins, CSS Filters.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; --soft-shadow: 0 10px 40px rgba(61, 43, 31, 0.08); }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; color: var(--coffee); }

        header { 
            background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; 
            padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            height: 70px; z-index: 10005; box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; letter-spacing: -0.5px; }
        nav.desktop-nav { display: flex; align-items: center; gap: 25px; }
        nav.desktop-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; opacity: 0.8; }
        nav.desktop-nav a.current { opacity: 1; position: relative; }
        nav.desktop-nav a.current::after { content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 2px; background: var(--accent); border-radius: 999px; }
        .nav-btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        #discovery-panel { width: 400px; background: var(--white); z-index: 1001; box-shadow: 10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow-y: auto; border-right: 1px solid #f2ece6; }
        .panel-content { padding: 32px; }
        .empty-state { text-align: center; margin-top: 100px; color: #bca08d; }
        
        .kicker { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .cafe-title { font-size: 2rem; font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
        .cafe-address { font-size: 0.9rem; color: #8a7b6f; margin-bottom: 24px; }
        .section-box { border-top: 1px solid #f2ece6; padding: 20px 0; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-label { font-size: 0.7rem; font-weight: 800; color: #bca08d; text-transform: uppercase; margin-bottom: 8px; }
        .section-data { font-size: 0.95rem; line-height: 1.6; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: var(--cream); color: #7a5a3d; padding: 6px 14px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; border: 1px solid #eee7df; }
        .action-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        .link-btn { text-align: center; text-decoration: none; background: var(--coffee); color: white; padding: 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; }
        .link-btn.secondary { background: var(--cream); color: var(--coffee); border: 1px solid #e6ddd2; }

        #map { flex: 1; z-index: 1; background: #e5e3df; }
        .leaflet-layer { filter: sepia(0.3) hue-rotate(-10deg) contrast(0.95) brightness(1.02); }
        .map-controls { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 1002; background: white; padding: 6px; border-radius: 50px; display: flex; box-shadow: 0 10px 30px rgba(61,43,31,0.15); }
        .mode-btn { border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: #999; background: transparent; text-transform: uppercase; }
        .mode-btn.active { background: var(--coffee); color: white; }

        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(26, 18, 12, 0.85); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 12vh auto; padding: 40px; width: 90%; max-width: 400px; border-radius: 30px; }
        .ans-input { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #eee; font-size: 1rem; margin-bottom: 15px; outline: none; }

        @media (max-width: 900px) { #discovery-panel { position: absolute; bottom: 0; width: 100%; height: 45vh; border-right: none; border-top: 1px solid #f2ece6; transform: translateY(100%); transition: 0.4s; } #discovery-panel.active { transform: translateY(0); } .map-controls { top: 15px; width: 90%; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav class="desktop-nav">
        <a href="index.html">Decoder</a> <a href="map.html" class="current">Explore Map</a> <a href="passport.html">Passport</a>
        <span class="auth-box"></span>
    </nav>
</header>

<div class="main-container">
    <aside id="discovery-panel"><div id="panel-inner" class="panel-content"><div class="empty-state"><p style="font-weight: 600;">Select a location on the map<br>to explore the Hạt & Hẻm.</p></div></div></aside>
    <div class="map-controls">
        <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm (Vibe)</button>
        <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt (Tech)</button>
    </div>
    <div id="map"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0;">Explorer Login</h2>
        <p id="auth-msg" style="font-size:0.85rem; color:#666; margin-bottom:20px;">Enter your credentials to access your Passport.</p>
        <input type="email" id="u_email" class="ans-input" placeholder="Email Address">
        <input type="password" id="u_pass" class="ans-input" placeholder="Password">
        <button class="nav-btn" style="width:100%; padding:18px;" onclick="submitAuth()">Continue</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">Cancel</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, mode = 'hem', cafes = [], selectedCafe = null;
    const customIcon = L.divIcon({ className: 'custom-pin', html: `<svg width="32" height="42" viewBox="0 0 32 42" fill="none"><path d="M16 0C7.163 0 0 7.163 0 16C0 24.837 16 42 16 42C16 42 32 24.837 32 16C32 7.163 24.837 0 16 0Z" fill="#3d2b1f"/><circle cx="16" cy="16" r="6" fill="#d4a373"/></svg>`, iconSize: [32, 42], iconAnchor: [16, 42] });

    function init() { map = L.map('map', { zoomControl: false }).setView([10.785, 106.695], 13); L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map); loadData(); syncAuthUI(); }
    async function loadData() { const r = await fetch('./cafes.json'); const d = await r.json(); cafes = d.filter(c => (c.district || '').toUpperCase().includes('HCM')); renderMarkers(); }
    function renderMarkers() { cafes.forEach(c => { const m = L.marker([c.lat, c.lng], { icon: customIcon }).addTo(map); m.on('click', () => { selectedCafe = c; updatePanel(c); map.panTo([c.lat, c.lng]); if(window.innerWidth <= 900) document.getElementById('discovery-panel').classList.add('active'); }); }); }
    function updatePanel(c) {
        let html = `<div class="kicker">${mode === 'hem' ? '📍 Hẻm Discovery' : '🧪 Hạt Analytics'}</div><h1 class="cafe-title">${c.name}</h1><p class="cafe-address">${c.address}</p>`;
        if (mode === 'hem') { html += `<div class="section-box"><div class="section-label">The Vibe</div><div class="section-data">${c.vibe}</div><p style="font-style:italic; margin-top:10px;">"${c.hem_note}"</p></div><div class="section-box"><div class="section-label">Signature</div><div class="section-data">${c.signature_drink}</div></div>`; }
        else { html += `<div class="section-box"><div class="section-label">Hardware</div><div class="section-data"><b>Machine:</b> ${c.machine}<br><b>Methods:</b> ${c.brew_methods.join(', ')}</div></div><div class="section-box"><div class="section-label">Profile</div><div class="section-data"><b>Beans:</b> ${c.beans}<br><b>Water:</b> ${c.tds}</div></div>`; }
        html += `<div class="action-links"><a href="${c.menu_url}" target="_blank" class="link-btn">View Menu</a><a href="${c.google_maps_url}" target="_blank" class="link-btn secondary">Google Maps</a></div>`;
        document.getElementById('panel-inner').innerHTML = html;
    }
    function setMode(m) { mode = m; document.getElementById('h1').classList.toggle('active', m === 'hem'); document.getElementById('h2').classList.toggle('active', m === 'hat'); if(selectedCafe) updatePanel(selectedCafe); }
    function openLogin() { document.getElementById('loginModal').style.display = 'block'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    function syncAuthUI() { const e = localStorage.getItem('uemail'); document.querySelectorAll('.auth-box').forEach(b => { b.innerHTML = e ? `<button class="nav-btn" onclick="logout()">Logout</button>` : `<button class="nav-btn" onclick="openLogin()">Login</button>`; }); }
    function submitAuth() {
        const e = document.getElementById('u_email').value.trim(), p = document.getElementById('u_pass').value.trim();
        if (!e.includes('@') || p.length < 3) return;
        const accts = JSON.parse(localStorage.getItem('accounts') || '{}');
        if (accts[e] && accts[e] !== p) return;
        accts[e] = p; localStorage.setItem('accounts', JSON.stringify(accts));
        localStorage.setItem('uemail', e); location.reload();
    }
    function logout() { localStorage.removeItem('uemail'); localStorage.removeItem('has_profile'); location.reload(); }
    window.onload = init;
</script>
</body>
</html>
