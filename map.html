<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; --soft-shadow: 0 10px 40px rgba(61, 43, 31, 0.08); }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; color: var(--coffee); }

        /* --- UNIFIED HEADER --- */
        header { 
            background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; 
            padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            height: 70px; z-index: 10005; box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; letter-spacing: -0.5px; }
        nav.desktop-nav { display: flex; align-items: center; gap: 25px; }
        nav.desktop-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; opacity: 0.8; }
        nav.desktop-nav a.current { opacity: 1; position: relative; }
        nav.desktop-nav a.current::after { content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 2px; background: var(--accent); border-radius: 999px; }
        .nav-btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* --- RESTYLED MAP --- */
        #map { flex: 1; width: 100%; z-index: 1; background: #e5e3df; }
        /* Coffee/Cream Map Filter */
        .leaflet-layer { filter: sepia(0.5) hue-rotate(-15deg) contrast(0.9) brightness(1.05); }

        .controls { 
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 6px; border-radius: 50px; 
            display: flex; box-shadow: 0 10px 30px rgba(61, 43, 31, 0.15); 
        }
        .mode-btn { 
            border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; 
            font-weight: 800; font-size: 0.7rem; color: #999; transition: 0.3s; background: transparent; text-transform: uppercase;
        }
        .mode-btn.active { background: var(--coffee); color: white; }

        /* --- THE PIN --- */
        .custom-pin { display: flex; justify-content: center; align-items: center; }

        /* --- THE POPUP (RIGHT SIDE FIXED) --- */
        .leaflet-popup-side {
            /* Force Popup to the Right */
            margin-left: 20px !important;
            margin-bottom: 35px !important; /* Centers it vertically with the pin */
        }
        .leaflet-popup-side .leaflet-popup-content-wrapper { 
            border-radius: 20px; padding: 0; 
            box-shadow: 0 15px 45px rgba(61, 43, 31, 0.2) !important;
            border: 1px solid rgba(212, 163, 115, 0.2);
            width: 310px;
        }
        .leaflet-popup-side .leaflet-popup-content { margin: 0 !important; width: 310px !important; }
        .leaflet-popup-side .leaflet-popup-tip-container { display: none; } /* Remove arrow */

        .pop-container { max-height: 400px; overflow-y: auto; padding: 24px; color: var(--coffee); }
        .pop-kicker { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
        .pop-title { font-size: 1.4rem; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
        .pop-subtitle { font-size: 0.75rem; color: #8a7b6f; margin-bottom: 15px; font-weight: 600; }
        
        .pop-section { border-top: 1px solid #f2ece6; padding-top: 12px; margin-top: 12px; }
        .pop-label { font-size: 0.65rem; font-weight: 800; color: #bca08d; text-transform: uppercase; margin-bottom: 4px; }
        .pop-data { font-size: 0.85rem; line-height: 1.5; margin-bottom: 8px; }

        .pop-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .pop-link-btn { 
            text-align: center; text-decoration: none; background: #fffcf9; 
            border: 1px solid #e6ddd2; color: var(--coffee); padding: 10px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: 800; transition: 0.2s;
        }
        .pop-link-btn:hover { border-color: var(--accent); background: var(--cream); }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag-chip { background: #f6efe8; color: #7a5a3d; padding: 4px 10px; border-radius: 999px; font-size: 0.6rem; font-weight: 700; }

        footer { flex-shrink: 0; background: var(--white); padding: 12px; font-size: 10px; color: #8a7b6f; text-align: center; border-top: 1px solid #eee; }

        @media (max-width: 850px) {
            nav.desktop-nav { display: none; }
            /* Return to top for mobile to avoid horizontal scrolling */
            .leaflet-popup-side { margin-left: 0 !important; margin-bottom: 15px !important; }
            .leaflet-popup-side .leaflet-popup-content-wrapper { width: 270px; }
            .leaflet-popup-side .leaflet-popup-content { width: 270px !important; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav class="desktop-nav">
        <a href="index.html">Decoder</a> 
        <a href="map.html" class="current">Explore Map</a> 
        <a href="passport.html">Passport</a>
        <span class="auth-box"></span>
    </nav>
</header>

<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm Mode</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt Mode</button>
</div>

<div id="map"></div>

<footer>© 2026 Nguyen Trong Tin @ RMIT University • Digital Media Studio 4 Build</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, mode = 'hem', cafes = [], markers = [];

    // --- 1. PIN STYLE ---
    const customIcon = L.divIcon({
        className: 'custom-pin',
        html: `<svg width="32" height="42" viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 0C7.163 0 0 7.163 0 16C0 24.837 16 42 16 42C16 42 32 24.837 32 16C32 7.163 24.837 0 16 0Z" fill="#3d2b1f"/>
                <circle cx="16" cy="16" r="6" fill="#d4a373"/>
               </svg>`,
        iconSize: [32, 42],
        iconAnchor: [16, 42],
        popupAnchor: [16, -21] // This anchors the popup center-right of the pin
    });

    // --- 2. MAP INIT ---
    function init() {
        map = L.map('map', { 
            zoomControl: false,
            closePopupOnClick: false // Prevents accidental closing
        }).setView([10.776, 106.700], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
        
        loadData();
        syncAuthUI();
    }

    async function loadData() {
        const res = await fetch('./cafes.json');
        const data = await res.json();
        cafes = data.filter(c => (c.district || '').toUpperCase().includes('HCM'));
        renderMarkers();
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        cafes.forEach((c) => {
            const m = L.marker([c.lat, c.lng], { icon: customIcon }).addTo(map);
            m.on('click', (e) => {
                L.DomEvent.stopPropagation(e); // Stop map from closing the popup
                updatePopup(m, c);
            });
            markers.push(m);
        });
    }

    // --- 3. THE DYNAMIC CONTENT ENGINE ---
    function updatePopup(marker, cafe) {
        let content = `<div class="pop-container">
            <div class="pop-kicker">${mode === 'hem' ? '📍 Hẻm Discovery' : '🧪 Hạt Analytics'}</div>
            <div class="pop-title">${cafe.name}</div>
            <div class="pop-subtitle">${cafe.address}</div>`;

        if (mode === 'hem') {
            content += `
                <div class="pop-data"><b>Vibe:</b> ${cafe.vibe}</div>
                <div class="pop-section">
                    <div class="pop-label">Alley Note</div>
                    <div class="pop-data"><i>"${cafe.hem_note}"</i></div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Why it Matters</div>
                    <div class="pop-data">${cafe.why_it_matters}</div>
                </div>`;
        } else {
            content += `
                <div class="pop-data"><b>Roaster:</b> ${cafe.roaster_type}</div>
                <div class="pop-section">
                    <div class="pop-label">Technical</div>
                    <div class="pop-data"><b>Machine:</b> ${cafe.machine}<br><b>Beans:</b> ${cafe.beans}</div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Brew Logic</div>
                    <div class="pop-data">${cafe.hat_note}</div>
                </div>`;
        }

        content += `
            <div class="pop-section">
                <div class="tag-cloud">
                    ${cafe.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                    <span class="tag-chip">${cafe.price_range}</span>
                </div>
            </div>
            <div class="pop-links">
                <a href="${cafe.menu_url}" target="_blank" class="pop-link-btn">📖 Menu</a>
                <a href="${cafe.google_maps_url}" target="_blank" class="pop-link-btn">🗺️ Maps</a>
            </div>
        </div>`;

        marker.bindPopup(content, { 
            closeButton: false,
            className: 'leaflet-popup-side',
            autoPan: true
        }).openPopup();

        // Slide map slightly so the side-popup is centered in space
        map.panTo([cafe.lat, cafe.lng + 0.012], {animate: true});
    }

    function setMode(m) {
        if (mode === m) return;
        mode = m;
        document.getElementById('h1').classList.toggle('active', mode === 'hem');
        document.getElementById('h2').classList.toggle('active', mode === 'hat');
        
        // SEAMLESS UPDATE: If a popup is open, swap HTML content without closing
        markers.forEach((m, index) => {
            if (m.getPopup() && m.getPopup().isOpen()) {
                updatePopup(m, cafes[index]);
            }
        });
    }

    function syncAuthUI() {
        const email = localStorage.getItem('uemail');
        document.querySelectorAll('.auth-box').forEach(box => {
            box.innerHTML = email ? `<button class="nav-btn" onclick="localStorage.clear(); location.reload();">Logout</button>` : `<button class="nav-btn" onclick="window.location.href='index.html'">Login</button>`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
