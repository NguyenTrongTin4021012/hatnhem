<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; }

        header { flex-shrink:0; background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; z-index: 10005; }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; }
        
        /* THE MAP STYLE - Custom Filter for Coffee/Cream look */
        #map { flex: 1; width: 100%; z-index: 1; background: var(--cream); }
        .leaflet-layer, .leaflet-control-zoom { 
            filter: sepia(0.4) hue-rotate(-15deg) contrast(0.9) brightness(1.05); 
        }

        /* Mode Switcher UI */
        .controls { 
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 6px; border-radius: 50px; 
            display: flex; box-shadow: 0 10px 30px rgba(61, 43, 31, 0.15); 
        }
        .mode-btn { 
            border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; 
            font-weight: 800; font-size: 0.7rem; color: #999; transition: 0.3s; 
            background: transparent; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .mode-btn.active { background: var(--coffee); color: white; }

        /* Custom Branded Popups */
        .leaflet-popup-content-wrapper { 
            border-radius: 20px; padding: 10px; 
            box-shadow: 0 10px 30px rgba(61, 43, 31, 0.2) !important;
            border: 1px solid rgba(212, 163, 115, 0.2);
        }
        .leaflet-popup-tip { background: white; }
        
        .pop-card { min-width: 220px; color: var(--coffee); }
        .pop-kicker { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .pop-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
        .pop-body { font-size: 0.85rem; line-height: 1.5; color: #5a4a3f; }
        .pop-tag { 
            display: inline-block; margin-top: 10px; background: #f6efe8; 
            color: #7a5a3d; padding: 4px 10px; border-radius: 999px; 
            font-size: 0.65rem; font-weight: 700; 
        }

        /* Navigation Jump */
        .city-jump { position: absolute; bottom: 30px; left: 20px; z-index: 1000; display: flex; gap: 8px; }
        .jump-btn { 
            background: white; border: none; padding: 10px 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; 
            font-size: 0.65rem; font-weight: 800; color: var(--coffee); 
        }

        footer { flex-shrink: 0; background: var(--white); padding: 10px; font-size: 10px; color: #8a7b6f; text-align: center; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav style="display: flex; gap: 20px;">
        <a href="index.html" style="color:white; text-decoration:none; font-size:0.8rem; font-weight:600;">Decoder</a>
        <a href="passport.html" style="color:white; text-decoration:none; font-size:0.8rem; font-weight:600;">Passport</a>
    </nav>
</header>

<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm Mode</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt Mode</button>
</div>

<div id="map"></div>

<div class="city-jump">
    <button class="jump-btn" onclick="map.flyTo([10.774, 106.702], 16)">District 1</button>
    <button class="jump-btn" onclick="map.flyTo([10.793, 106.707], 16)">Binh Thanh</button>
</div>

<footer>© 2026 Nguyen Trong Tin @ RMIT University • Digital Media Studio 4</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, mode = 'hem', cafes = [], markers = [];
    let activeCafe = null; // Tracks which cafe is currently viewed

    // Initialize Map
    function init() {
        map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([10.776, 106.700], 13);
        
        // Muted Carto Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd'
        }).addTo(map);

        loadData();
    }

    async function loadData() {
        const res = await fetch('./cafes.json');
        const data = await res.json();
        cafes = data.filter(c => c.district.includes('HCM'));
        renderMarkers();
    }

    function renderMarkers() {
        // Clear existing markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        cafes.forEach(c => {
            // Custom Marker Styling (Accent color circle)
            const m = L.circleMarker([c.lat, c.lng], {
                radius: 8,
                fillColor: "#d4a373",
                color: "#3d2b1f",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            m.on('click', () => {
                activeCafe = c;
                updatePopup(m, c);
            });

            markers.push(m);
        });
    }

    // This function builds the content and opens it
    function updatePopup(marker, cafe) {
        let content = `
            <div class="pop-card">
                <div class="pop-kicker">${mode === 'hem' ? 'Vibe Explorer' : 'Technical Data'}</div>
                <div class="pop-title">${cafe.name}</div>
                <div class="pop-body">
                    ${mode === 'hem' 
                        ? `📍 ${cafe.address}<br>✨ ${cafe.vibe}<br><br><i>${cafe.hem_note}</i>` 
                        : `⚙️ ${cafe.machine}<br>🫘 ${cafe.beans}<br>🔥 ${cafe.roast_style}<br>💧 ${cafe.tds || '110ppm'}`
                    }
                </div>
                <div class="pop-tag">${cafe.district}</div>
            </div>
        `;
        
        marker.bindPopup(content, { 
            offset: [0, -5],
            closeButton: false,
            className: 'branded-popup'
        }).openPopup();
        
        map.panTo(marker.getLatLng(), {animate: true});
    }

    function setMode(m) {
        if (mode === m) return;
        mode = m;

        // Update Buttons
        document.getElementById('h1').classList.toggle('active', mode === 'hem');
        document.getElementById('h2').classList.toggle('active', mode === 'hat');

        // IF a popup is open, update its content immediately without closing
        markers.forEach((m, index) => {
            if (m.getPopup() && m.getPopup().isOpen()) {
                updatePopup(m, cafes[index]);
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
