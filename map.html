<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hạt & Hẻm | Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; }
        body { margin: 0; font-family: 'Be Vietnam Pro', sans-serif; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; }
        header { background: rgba(61, 43, 31, 0.98); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; z-index: 10005; }
        #map { flex: 1; width: 100%; z-index: 1; }
        .controls { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 5px; border-radius: 50px; display: flex; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .mode-btn { border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: #999; }
        .mode-btn.active { background: var(--coffee); color: white; }
        footer { background: var(--white); padding: 10px 5%; font-size: 9px; color: #8a7b6f; border-top: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>
<header><a href="index.html" style="color:white; text-decoration:none; font-weight:800;">Hạt & Hẻm</a></header>
<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm Mode</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt Mode</button>
</div>
<div id="map"></div>
<footer>© 2026 Nguyen Trong Tin @ RMIT University • Static build</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map = L.map('map', {zoomControl: false}).setView([10.776, 106.700], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    let mode = 'hem';

    async function load() {
        const res = await fetch('./cafes.json');
        const data = await res.json();
        data.filter(c => c.district.includes('HCM')).forEach(c => {
            L.marker([c.lat, c.lng]).addTo(map).bindPopup(`<b>${c.name}</b><br>${mode === 'hem' ? c.vibe : c.machine}`);
        });
    }
    function setMode(m) { mode = m; document.getElementById('h1').classList.toggle('active', m==='hem'); document.getElementById('h2').classList.toggle('active', m==='hat'); }
    window.onload = load;
</script>
</body>
</html>
