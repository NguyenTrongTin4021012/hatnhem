<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; }

        header { flex-shrink:0; background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; z-index: 10005; }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; }
        
        #map { flex: 1; width: 100%; z-index: 1; background: var(--cream); }
        /* Coffee Parchment Filter */
        .leaflet-layer { filter: sepia(0.3) hue-rotate(-10deg) contrast(0.95) brightness(1.02); }

        .controls { 
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 6px; border-radius: 50px; 
            display: flex; box-shadow: 0 10px 30px rgba(61, 43, 31, 0.15); 
        }
        .mode-btn { 
            border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; 
            font-weight: 800; font-size: 0.7rem; color: #999; transition: 0.3s; 
            background: transparent; text-transform: uppercase;
        }
        .mode-btn.active { background: var(--coffee); color: white; }

        /* PROFESSIONAL PIN STYLING */
        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .pin-svg {
            filter: drop-shadow(0 4px 6px rgba(61, 43, 31, 0.4));
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .custom-pin:hover .pin-svg {
            transform: scale(1.15) translateY(-2px);
            filter: drop-shadow(0 6px 10px rgba(61, 43, 31, 0.5));
        }

        /* POPUP STYLING */
        .leaflet-popup-content-wrapper { 
            border-radius: 24px; padding: 0; 
            box-shadow: 0 15px 45px rgba(61, 43, 31, 0.25) !important;
            border: 1px solid rgba(212, 163, 115, 0.2);
            width: 300px; 
        }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .leaflet-popup-tip { background: white; }
        
        .pop-container { max-height: 400px; overflow-y: auto; padding: 24px; }
        .pop-kicker { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .pop-title { font-size: 1.4rem; font-weight: 800; color: var(--coffee); margin-bottom: 4px; line-height: 1.1; }
        .pop-subtitle { font-size: 0.75rem; color: #8a7b6f; margin-bottom: 18px; font-weight: 600; }
        
        .pop-section { border-top: 1px solid #f0e6dc; padding-top: 15px; margin-top: 15px; }
        .pop-label { font-size: 0.7rem; font-weight: 800; color: #bca08d; text-transform: uppercase; margin-bottom: 5px; }
        .pop-data { font-size: 0.85rem; line-height: 1.5; color: var(--coffee); margin-bottom: 10px; }
        
        .pop-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
        .pop-link-btn { 
            text-align: center; text-decoration: none; background: #fdfaf7; 
            border: 1px solid #e6ddd2; color: var(--coffee); padding: 10px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: 800; transition: 0.2s;
        }
        .pop-link-btn:hover { background: #f6efe8; border-color: var(--accent); }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag-chip { background: #f6efe8; color: #7a5a3d; padding: 4px 10px; border-radius: 999px; font-size: 0.6rem; font-weight: 700; }

        .city-jump { position: absolute; bottom: 30px; left: 20px; z-index: 1000; display: flex; gap: 8px; }
        .jump-btn { background: white; border: none; padding: 12px 18px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; font-size: 0.65rem; font-weight: 800; color: var(--coffee); }

        footer { flex-shrink: 0; background: var(--white); padding: 10px; font-size: 10px; color: #8a7b6f; text-align: center; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav style="display: flex; gap: 20px;">
        <a href="index.html" style="color:white; text-decoration:none; font-size:0.8rem; font-weight:600;">Decoder</a>
        <a href="passport.html" style="color:white; text-decoration:none; font-size:0.8rem; font-weight:600;">Passport</a>
    </nav>
</header>

<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm (Alley Vibe)</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt (Bean Tech)</button>
</div>

<div id="map"></div>

<div class="city-jump">
    <button class="jump-btn" onclick="map.flyTo([10.774, 106.702], 16)">District 1</button>
    <button class="jump-btn" onclick="map.flyTo([10.793, 106.707], 16)">Binh Thanh</button>
</div>

<footer>© 2026 Nguyen Trong Tin @ RMIT University • Digital Media Studio 4</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, mode = 'hem', cafes = [], markers = [];

    // DEFINE THE PROFESSIONAL PIN SVG
    const pinSVG = `
        <svg class="pin-svg" width="32" height="42" viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 0C7.16344 0 0 7.16344 0 16C0 24.8366 16 42 16 42C16 42 32 24.8366 32 16C32 7.16344 24.8366 0 16 0Z" fill="#3d2b1f"/>
            <circle cx="16" cy="16" r="6" fill="#d4a373"/>
        </svg>
    `;

    function init() {
        map = L.map('map', { zoomControl: false, preferCanvas: false }).setView([10.776, 106.700], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
        loadData();
    }

    async function loadData() {
        const res = await fetch('./cafes.json');
        const data = await res.json();
        cafes = data.filter(c => c.district && c.district.toUpperCase().includes('HCM'));
        renderMarkers();
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        const customIcon = L.divIcon({
            className: 'custom-pin',
            html: pinSVG,
            iconSize: [32, 42],
            iconAnchor: [16, 42]
        });

        cafes.forEach((c) => {
            const m = L.marker([c.lat, c.lng], { icon: customIcon }).addTo(map);
            m.on('click', () => updatePopup(m, c));
            markers.push(m);
        });
    }

    function updatePopup(marker, cafe) {
        let content = `<div class="pop-container">`;
        content += `
            <div class="pop-kicker">${mode === 'hem' ? '📍 Hẻm Discovery' : '🧪 Hạt Analytics'}</div>
            <div class="pop-title">${cafe.name}</div>
            <div class="pop-subtitle">${cafe.address}</div>
        `;

        if (mode === 'hem') {
            content += `
                <div class="pop-data"><b>The Vibe:</b> ${cafe.vibe}</div>
                <div class="pop-data"><b>Signature:</b> ${cafe.signature_drink}</div>
                <div class="pop-section">
                    <div class="pop-label">Why it Matters</div>
                    <div class="pop-data">${cafe.why_it_matters}</div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Alley Note</div>
                    <div class="pop-data"><i>"${cafe.hem_note}"</i></div>
                </div>
            `;
        } else {
            content += `
                <div class="pop-data"><b>Roaster:</b> ${cafe.roaster_type}</div>
                <div class="pop-data"><b>Origin Focus:</b> ${cafe.origin_focus}</div>
                <div class="pop-section">
                    <div class="pop-label">Hardware</div>
                    <div class="pop-data">
                        <b>Machine:</b> ${cafe.machine}<br>
                        <b>Methods:</b> ${cafe.brew_methods.join(', ')}
                    </div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Roast Profile</div>
                    <div class="pop-data">
                        <b>Style:</b> ${cafe.roast_style}<br>
                        <b>Beans:</b> ${cafe.beans}
                    </div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Brewer's Note</div>
                    <div class="pop-data">${cafe.hat_note}</div>
                </div>
            `;
        }

        content += `
            <div class="pop-section">
                <div class="pop-label">Tags</div>
                <div class="tag-cloud">
                    ${cafe.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                    <span class="tag-chip">${cafe.price_range}</span>
                </div>
            </div>
            <div class="pop-links">
                <a href="${cafe.menu_url}" target="_blank" class="pop-link-btn">📖 Menu</a>
                <a href="${cafe.social_url}" target="_blank" class="pop-link-btn">📸 Social</a>
                <a href="${cafe.google_maps_url}" target="_blank" class="pop-link-btn" style="grid-column: span 2;">🗺️ View on Google Maps</a>
            </div>
            </div>
        `;

        marker.bindPopup(content, { 
            offset: [0, -40], // Adjust offset for pin height
            closeButton: false,
            maxWidth: 300
        }).openPopup();

        map.panTo(marker.getLatLng());
    }

    function setMode(m) {
        if (mode === m) return;
        mode = m;
        document.getElementById('h1').classList.toggle('active', mode === 'hem');
        document.getElementById('h2').classList.toggle('active', mode === 'hat');

        markers.forEach((m, index) => {
            if (m.getPopup() && m.getPopup().isOpen()) {
                updatePopup(m, cafes[index]);
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
