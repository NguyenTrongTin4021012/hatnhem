<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; }

        header { flex-shrink:0; background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; z-index: 10005; }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; }
        nav.desktop-nav { display: flex; align-items: center; gap: 25px; }
        nav.desktop-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; opacity: 0.8; }
        .nav-btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #map { flex: 1; width: 100%; z-index: 1; }
        .controls { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 5px; border-radius: 50px; display: flex; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .mode-btn { border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 0.7rem; color: #999; }
        .mode-btn.active { background: var(--coffee); color: white; }

        .city-jump { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 50px; display: flex; gap: 15px; overflow-x: auto; max-width: 90%; white-space: nowrap; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .city-link { font-size: 0.65rem; font-weight: 800; color: var(--coffee); cursor: pointer; opacity: 0.6; }
        
        .map-footer { flex-shrink: 0; background: var(--white); padding: 10px 5%; font-size: 9px; color: #8a7b6f; border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 10006; }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav class="desktop-nav">
        <a href="index.html">Decoder</a> <a href="map.html">Explore Map</a> <a href="passport.html">Passport</a>
        <span class="auth-box"></span>
    </nav>
</header>
<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm Mode</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt Mode</button>
</div>
<div id="map"></div>
<div class="city-jump">
    <span class="city-link" onclick="flyTo([21.02, 105.85])">HÀ NỘI</span>
    <span class="city-link" onclick="flyTo([16.05, 108.20])">ĐÀ NẴNG</span>
    <span class="city-link" onclick="flyTo([11.94, 108.45])">ĐÀ LẠT</span>
    <span class="city-link" onclick="flyTo([10.77, 106.70])">HCM</span>
</div>
<footer class="map-footer">
    <div>© 2024 Nguyen Trong Tin @ RMIT University</div>
    <div>Data © OpenStreetMap | Powered by Gemini AI</div>
</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script>
    let map, markerCluster, mode = 'hem', cafeData = [];
    function init() {
        map = L.map('map', {zoomControl: false, preferCanvas: true, attributionControl: false}).setView([15.8, 108.0], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        markerCluster = L.markerClusterGroup({ maxClusterRadius: 50 });
        load();
    }
    async function load() {
        const res = await fetch('./cafes.json'); cafeData = await res.json();
        renderMarkers();
    }
    function getPopupHtml(c) {
        if(mode === 'hem') return `<div style="min-width:180px"><b>${c.name}</b><p style="font-size:11px; margin:4px 0;">📍 ${c.address}</p><small>✨ ${c.vibe}</small></div>`;
        else return `<div style="min-width:180px"><b>${c.name} (Tech)</b><p style="font-size:11px; margin:4px 0;">⚙️ ${c.machine}</p><p style="font-size:11px; margin:4px 0;">💧 ${c.tds}</p></div>`;
    }
    function renderMarkers() {
        markerCluster.clearLayers();
        cafeData.forEach(c => {
            const m = L.marker([c.lat, c.lng]).bindPopup(getPopupHtml(c));
            m.cafeDetails = c; markerCluster.addLayer(m);
        });
        map.addLayer(markerCluster);
    }
    function setMode(m) {
        if (mode === m) return; mode = m;
        document.getElementById('h1').classList.toggle('active', m === 'hem');
        document.getElementById('h2').classList.toggle('active', m === 'hat');
        markerCluster.eachLayer(layer => { layer.setPopupContent(getPopupHtml(layer.cafeDetails)); });
    }
    function flyTo(coords) { map.flyTo(coords, 14, { animate: true, duration: 1.8 }); }
    window.onload = () => {
        init(); const uid = localStorage.getItem('uid');
        document.querySelector('.auth-box').innerHTML = uid ? `<button class="nav-btn" onclick="localStorage.clear(); location.reload();">Logout</button>` : `<button class="nav-btn" onclick="window.location.href='index.html'">Login</button>`;
    };
</script>
</body>
</html>
