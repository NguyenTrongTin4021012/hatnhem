    PROJECT: Hạt & Hẻm (Bean & Alley)
    AUTHOR: Nguyen Trong Tin at RMIT University
    VERSION: 2026 Unified UI Build
    TECH STACK: Leaflet.js, Custom SVG Pins, CSS Filters.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Map</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; --soft-shadow: 0 10px 40px rgba(61, 43, 31, 0.08); }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--cream); overflow: hidden; color: var(--coffee); }

        /* --- UNIFIED HEADER STYLING --- */
        header { 
            background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; 
            padding: 0 5%; display: flex; justify-content: space-between; align-items: center; 
            height: 70px; z-index: 10005; box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; letter-spacing: -0.5px; }
        nav.desktop-nav { display: flex; align-items: center; gap: 25px; }
        nav.desktop-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; opacity: 0.8; }
        nav.desktop-nav a:hover { opacity: 1; }
        .nav-btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        nav.desktop-nav a.current { opacity: 1; position: relative; }
        nav.desktop-nav a.current::after { content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 2px; background: var(--accent); border-radius: 999px; }

        /* Burger Menu */
        .burger { display: none; cursor: pointer; flex-direction: column; gap: 6px; padding: 10px; z-index: 10010; }
        .burger div { width: 28px; height: 3px; background: white; border-radius: 5px; transition: 0.3s; }
        .burger.active .line1 { transform: rotate(45deg) translate(6px, 6px); }
        .burger.active .line2 { opacity: 0; }
        .burger.active .line3 { transform: rotate(-45deg) translate(6px, -6px); }

        .mobile-menu { position: fixed; top: 0; right: -100%; width: 75%; max-width: 300px; height: 100vh; background: var(--coffee); z-index: 10008; padding: 100px 40px; display: flex; flex-direction: column; gap: 25px; transition: 0.4s; }
        .mobile-menu.active { right: 0; }
        .mobile-menu a { color: white; text-decoration: none; font-size: 1.3rem; font-weight: 700; }
        #menuOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10007; display: none; opacity: 0; transition: 0.3s; }
        #menuOverlay.active { display: block; opacity: 1; }

        /* --- MAP & CONTROLS --- */
        #map { flex: 1; width: 100%; z-index: 1; background: var(--cream); }
        .leaflet-layer { filter: sepia(0.3) hue-rotate(-10deg) contrast(0.95) brightness(1.02); }

        .controls { 
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 6px; border-radius: 50px; 
            display: flex; box-shadow: 0 10px 30px rgba(61, 43, 31, 0.15); 
        }
        .mode-btn { 
            border: none; padding: 10px 22px; border-radius: 30px; cursor: pointer; 
            font-weight: 800; font-size: 0.7rem; color: #999; transition: 0.3s; 
            background: transparent; text-transform: uppercase;
        }
        .mode-btn.active { background: var(--coffee); color: white; }

        /* PROFESSIONAL PIN STYLING */
        .custom-pin { display: flex; justify-content: center; align-items: center; }
        .pin-svg { filter: drop-shadow(0 4px 6px rgba(61, 43, 31, 0.3)); transition: 0.2s; }
        .custom-pin:hover .pin-svg { transform: scale(1.1); filter: drop-shadow(0 6px 12px rgba(61, 43, 31, 0.4)); }

        /* SIDE-ALIGNED POPUP STYLING */
        .leaflet-popup-content-wrapper { 
            border-radius: 20px; padding: 0; 
            box-shadow: 0 15px 40px rgba(61, 43, 31, 0.2) !important;
            border: 1px solid rgba(212, 163, 115, 0.15);
            overflow: hidden;
        }
        .leaflet-popup-content { margin: 0; width: 320px !important; }
        .leaflet-popup-tip-container { display: none; }
        
        .pop-container { max-height: 420px; overflow-y: auto; padding: 24px; color: var(--coffee); }
        .pop-kicker { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
        .pop-title { font-size: 1.4rem; font-weight: 800; line-height: 1.1; margin-bottom: 6px; }
        .pop-subtitle { font-size: 0.75rem; color: #8a7b6f; margin-bottom: 15px; font-weight: 600; }
        .pop-section { border-top: 1px solid #f2ece6; padding-top: 15px; margin-top: 15px; }
        .pop-label { font-size: 0.65rem; font-weight: 800; color: #bca08d; text-transform: uppercase; margin-bottom: 6px; }
        .pop-data { font-size: 0.85rem; line-height: 1.6; margin-bottom: 8px; }

        .pop-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .pop-link-btn { 
            text-align: center; text-decoration: none; background: #fffcf9; 
            border: 1px solid #e6ddd2; color: var(--coffee); padding: 10px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: 800; transition: 0.2s;
        }
        .pop-link-btn:hover { border-color: var(--accent); background: var(--cream); }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag-chip { background: #f6efe8; color: #7a5a3d; padding: 4px 10px; border-radius: 999px; font-size: 0.6rem; font-weight: 700; }

        .city-jump { position: absolute; bottom: 30px; left: 20px; z-index: 1000; display: flex; gap: 8px; }
        .jump-btn { background: white; border: none; padding: 12px 18px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; font-size: 0.65rem; font-weight: 800; color: var(--coffee); }

        footer { flex-shrink: 0; background: var(--white); padding: 12px; font-size: 10px; color: #8a7b6f; text-align: center; border-top: 1px solid #eee; }

        @media (max-width: 850px) {
            nav.desktop-nav { display: none; }
            .burger { display: flex; }
            .leaflet-popup-content { width: 280px !important; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav class="desktop-nav">
        <a href="index.html">Decoder</a> 
        <a href="map.html" class="current">Explore Map</a> 
        <a href="passport.html">Passport</a>
        <span class="auth-box"></span>
    </nav>
    <div class="burger" onclick="toggleMenu()"><div class="line1"></div><div class="line2"></div><div class="line3"></div></div>
</header>

<div id="menuOverlay" onclick="toggleMenu()"></div>
<div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="toggleMenu()">Decoder</a>
    <a href="map.html" class="current" onclick="toggleMenu()">Explore Map</a>
    <a href="passport.html" onclick="toggleMenu()">Passport</a>
    <div class="auth-box"></div>
</div>

<div class="controls">
    <button id="h1" class="mode-btn active" onclick="setMode('hem')">Hẻm (Alley Vibe)</button>
    <button id="h2" class="mode-btn" onclick="setMode('hat')">Hạt (Bean Tech)</button>
</div>

<div id="map"></div>

<div class="city-jump">
    <button class="jump-btn" onclick="map.flyTo([10.774, 106.702], 16)">District 1</button>
    <button class="jump-btn" onclick="map.flyTo([10.793, 106.707], 16)">Binh Thanh</button>
</div>

<footer>© 2026 Nguyen Trong Tin @ RMIT University • Digital Media Studio 4 Build</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, mode = 'hem', cafes = [], markers = [];

    const pinSVG = `
        <svg class="pin-svg" width="32" height="42" viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 0C7.16344 0 0 7.16344 0 16C0 24.8366 16 42 16 42C16 42 32 24.8366 32 16C32 7.16344 24.8366 0 16 0Z" fill="#3d2b1f"/>
            <circle cx="16" cy="16" r="6" fill="#d4a373"/>
        </svg>
    `;

    // --- NAVIGATION & AUTH LOGIC ---
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
        document.getElementById('menuOverlay').classList.toggle('active');
        document.querySelector('.burger').classList.toggle('active');
    }

    function syncAuthUI() {
        const email = localStorage.getItem('uemail');
        document.querySelectorAll('.auth-box').forEach(box => {
            box.innerHTML = email ? 
                `<button class="nav-btn" onclick="logout()">Logout</button>` : 
                `<button class="nav-btn" onclick="window.location.href='index.html'">Login</button>`;
        });
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- MAP CORE ---
    function init() {
        map = L.map('map', { zoomControl: false }).setView([10.776, 106.700], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { subdomains: 'abcd' }).addTo(map);
        loadData();
        syncAuthUI();
    }

    async function loadData() {
        try {
            const res = await fetch('./cafes.json');
            const data = await res.json();
            cafes = data.filter(c => c.district && c.district.toUpperCase().includes('HCM'));
            renderMarkers();
        } catch(e) { console.error("Could not load cafes.json"); }
    }

    function renderMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        const customIcon = L.divIcon({
            className: 'custom-pin',
            html: pinSVG,
            iconSize: [32, 42],
            iconAnchor: [16, 42]
        });

        cafes.forEach((c) => {
            const m = L.marker([c.lat, c.lng], { icon: customIcon }).addTo(map);
            m.on('click', () => updatePopup(m, c));
            markers.push(m);
        });
    }

    function updatePopup(marker, cafe) {
        let content = `<div class="pop-container">`;
        content += `
            <div class="pop-kicker">${mode === 'hem' ? '📍 Hẻm Discovery' : '🧪 Hạt Analytics'}</div>
            <div class="pop-title">${cafe.name}</div>
            <div class="pop-subtitle">${cafe.address}</div>
        `;

        if (mode === 'hem') {
            content += `
                <div class="pop-data"><b>The Vibe:</b> ${cafe.vibe}</div>
                <div class="pop-data"><b>Signature:</b> ${cafe.signature_drink}</div>
                <div class="pop-section">
                    <div class="pop-label">Discovery Note</div>
                    <div class="pop-data">${cafe.why_it_matters}</div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">The Alley Soul</div>
                    <div class="pop-data"><i>"${cafe.hem_note}"</i></div>
                </div>
            `;
        } else {
            content += `
                <div class="pop-data"><b>Roaster:</b> ${cafe.roaster_type}</div>
                <div class="pop-data"><b>Origin Focus:</b> ${cafe.origin_focus}</div>
                <div class="pop-section">
                    <div class="pop-label">Extraction Gear</div>
                    <div class="pop-data"><b>Machine:</b> ${cafe.machine}<br><b>Methods:</b> ${cafe.brew_methods.join(', ')}</div>
                </div>
                <div class="pop-section">
                    <div class="pop-label">Bean Profile</div>
                    <div class="pop-data"><b>Roast:</b> ${cafe.roast_style}<br><b>Beans:</b> ${cafe.beans}</div>
                </div>
            `;
        }

        content += `
            <div class="pop-section">
                <div class="pop-label">Tags</div>
                <div class="tag-cloud">
                    ${cafe.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                    <span class="tag-chip">${cafe.price_range}</span>
                </div>
            </div>
            <div class="pop-links">
                <a href="${cafe.menu_url}" target="_blank" class="pop-link-btn">📖 Menu</a>
                <a href="${cafe.social_url}" target="_blank" class="pop-link-btn">📸 Social</a>
                <a href="${cafe.google_maps_url}" target="_blank" class="pop-link-btn" style="grid-column: span 2;">🗺️ View on Google Maps</a>
            </div>
        </div>`;

        marker.bindPopup(content, { 
            offset: [18, -21], 
            closeButton: false,
            autoPanPadding: [50, 50],
            maxWidth: 320
        }).openPopup();

        const targetPoint = map.project(marker.getLatLng(), map.getZoom());
        targetPoint.x += 160; 
        map.panTo(map.unproject(targetPoint, map.getZoom()), {animate: true});
    }

    function setMode(m) {
        if (mode === m) return;
        mode = m;
        document.getElementById('h1').classList.toggle('active', mode === 'hem');
        document.getElementById('h2').classList.toggle('active', mode === 'hat');
        markers.forEach((m, index) => {
            if (m.getPopup() && m.getPopup().isOpen()) { updatePopup(m, cafes[index]); }
        });
    }

    window.onload = init;
</script>
</body>
</html>
