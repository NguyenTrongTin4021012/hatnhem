<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hạt & Hẻm | Passport</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; }
        body { background: var(--cream); margin: 0; font-family: 'Be Vietnam Pro', sans-serif; }
        header { background: rgba(61, 43, 31, 0.98); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        main { margin-top: 30px; padding: 0 5% 50px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .profile-card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 30px; }
        .stamp { background: white; border-radius: 50%; aspect-ratio: 1/1; border: 2px dashed #ddd; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.7rem; font-weight: 800; color: #ccc; }
        .stamp.collected { border: 2px solid var(--accent); color: var(--coffee); background: #fffcf5; transform: rotate(-5deg); }
        footer { padding: 40px; text-align: center; font-size: 11px; color: #8a7b6f; opacity: 0.7; }
    </style>
</head>
<body>
<header><a href="index.html" style="color:white; text-decoration:none; font-weight:800;">Hạt & Hẻm</a></header>
<main>
    <div id="p-active" class="profile-card" style="display:none;">
        <div>
            <h2 id="u-name" style="margin-top:0;">Explorer</h2>
            <p id="p-story" style="font-style:italic; line-height:1.6; border-left: 4px solid var(--accent); padding-left:15px;"></p>
            <div id="p-recs" style="background:#f9f9f9; padding:15px; border-radius:15px; font-size:0.8rem;"></div>
        </div>
        <canvas id="p-chart"></canvas>
    </div>
    <div id="p-empty" style="text-align:center; padding:50px; border:2px dashed #ccc; border-radius:20px;">
        <h3>No profile found</h3>
        <p>Go to the Decoder to find your coffee DNA.</p>
        <button onclick="location.href='index.html'" style="padding:10px 20px; background:var(--coffee); color:white; border:none; border-radius:10px; cursor:pointer;">Start Decoder</button>
    </div>
    <h3 style="margin-top:40px;">📜 Journey Stamps</h3>
    <div class="grid" id="grid"></div>
</main>
<footer>© 2026 Nguyen Trong Tin @ RMIT University</footer>
<script>
    async function load() {
        const hasProfile = localStorage.getItem('has_profile');
        if(hasProfile) {
            document.getElementById('p-empty').style.display = 'none';
            document.getElementById('p-active').style.display = 'grid';
            document.getElementById('u-name').innerText = (localStorage.getItem('uemail') || 'Explorer').split('@')[0];
            document.getElementById('p-story').innerText = localStorage.getItem('p_story') || "Your journey starts here.";
            
            // Fixed the "Unexpected end of input" by providing a fallback string "{}"
            const recs = JSON.parse(localStorage.getItem('p_recs') || "{}");
            document.getElementById('p-recs').innerHTML = `<b>Match:</b> ${recs.cafe || 'None'}<br><b>Drink:</b> ${recs.drink || 'None'}`;
            
            const scores = JSON.parse(localStorage.getItem('p_scores') || "[5,5,5,5,5,5]");
            new Chart(document.getElementById('p-chart'), {
                type: 'radar',
                data: { labels: ["Floral", "Fruity", "Sour", "Sweet", "Nutty", "Roasted"], datasets: [{ data: scores, backgroundColor: 'rgba(212, 163, 115, 0.3)', borderColor: '#3d2b1f' }] },
                options: { scales: { r: { suggestedMax: 10, ticks: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        const res = await fetch('./cafes.json');
        const cafes = await res.json();
        const matched = localStorage.getItem('matched_cafe');
        const grid = document.getElementById('grid');
        cafes.forEach((c, i) => {
            const isMatch = c.name === matched || i < 2; // Demo purpose matches
            grid.innerHTML += `<div class="stamp ${isMatch ? 'collected' : ''}"><b>${c.name}</b></div>`;
        });
    }
    window.onload = load;
</script>
</body>
</html>
