<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hạt & Hẻm | Passport</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --coffee: #3d2b1f; --cream: #fdfaf7; --accent: #d4a373; --white: #ffffff; --soft-shadow: 0 10px 40px rgba(61, 43, 31, 0.08); }
        * { box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }
        body { background: var(--cream); margin: 0; color: var(--coffee); overflow-x: hidden; }

        header { background: rgba(61, 43, 31, 0.98); backdrop-filter: blur(10px); color: white; padding: 0 5%; display: flex; justify-content: space-between; align-items: center; height: 70px; position: fixed; top: 0; width: 100%; z-index: 10005; }
        .logo { font-size: 1.2rem; font-weight: 800; text-decoration: none; color: white; }
        nav.desktop-nav { display: flex; align-items: center; gap: 25px; }
        nav.desktop-nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; opacity: 0.8; }
        nav.desktop-nav a.current { opacity: 1; position: relative; }
        nav.desktop-nav a.current::after { content: ""; position: absolute; left: 0; right: 0; bottom: -8px; height: 2px; background: var(--accent); border-radius: 999px; }
        .nav-btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        main { margin-top: 100px; padding: 0 5% 50px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .profile-card { background: white; border-radius: 30px; padding: 40px; box-shadow: var(--soft-shadow); margin-bottom: 40px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; align-items: center; }
        #p-story { font-style: italic; line-height: 1.7; border-left: 5px solid var(--accent); padding-left: 20px; margin-bottom: 25px; }
        .match-badge { background: var(--cream); padding: 20px; border-radius: 20px; border: 1px solid #eee; }
        .mini-stats { display: flex; gap: 10px; margin-top: 20px; }
        .mini-stat { background: #f6efe8; color: #7a5a3d; padding: 8px 15px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 30px; }
        .stamp { background: #fff; border-radius: 50%; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ddd; text-align: center; font-size: 0.75rem; font-weight: 800; color: #bbb; padding: 15px; }
        .stamp.collected { border: 2.5px solid var(--accent); color: var(--coffee); background: #fffcf5; transform: rotate(-5deg); box-shadow: 0 8px 25px rgba(212, 163, 115, 0.15); }
        #p-empty { text-align: center; padding: 80px 20px; border: 3px dashed #eee; border-radius: 40px; background: white; }
        
        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(26, 18, 12, 0.85); backdrop-filter: blur(8px); }
        .modal-content { background: white; margin: 12vh auto; padding: 40px; width: 90%; max-width: 400px; border-radius: 30px; }
        .ans-input { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #eee; font-size: 1rem; margin-bottom: 15px; outline: none; }

        @media (max-width: 850px) { .profile-card { grid-template-columns: 1fr; text-align: center; } .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Hạt & Hẻm</a>
    <nav class="desktop-nav">
        <a href="index.html">Decoder</a> <a href="map.html">Map</a> <a href="passport.html" class="current">Passport</a>
        <span class="auth-box"></span>
    </nav>
</header>

<main>
    <div id="p-empty" style="display:none;"><h2>Passport Empty</h2><p>Login or take the quiz to start.</p><button class="nav-btn" onclick="window.location.href='index.html'">Start Decoder</button></div>
    <div class="profile-card" id="p-active" style="display:none;">
        <div><h1 id="u-name" style="margin:0 0 10px 0;">Explorer</h1><p id="p-story"></p><div class="match-badge"><b>Match:</b> <span id="p-recs">...</span></div><div class="mini-stats"><span class="mini-stat" id="stat-stamps">0 Stamps</span></div></div>
        <canvas id="p-chart"></canvas>
    </div>
    <h3 style="margin-top:50px;">📜 Journey Stamps</h3>
    <div class="grid" id="stamp-grid"></div>
</main>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>Login</h2>
        <input type="email" id="u_email" class="ans-input" placeholder="Email">
        <input type="password" id="u_pass" class="ans-input" placeholder="Password">
        <button class="nav-btn" style="width:100%;" onclick="submitAuth()">Continue</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
    function openLogin() { document.getElementById('loginModal').style.display = 'block'; }
    function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
    function syncAuthUI() { const e = localStorage.getItem('uemail'); document.querySelectorAll('.auth-box').forEach(b => { b.innerHTML = e ? `<button class="nav-btn" onclick="logout()">Logout</button>` : `<button class="nav-btn" onclick="openLogin()">Login</button>`; }); }
    function submitAuth() {
        const e = document.getElementById('u_email').value.trim(), p = document.getElementById('u_pass').value.trim();
        const accts = JSON.parse(localStorage.getItem('accounts') || '{}');
        if (accts[e] && accts[e] !== p) return;
        accts[e] = p; localStorage.setItem('accounts', JSON.stringify(accts));
        localStorage.setItem('uemail', e); location.reload();
    }
    function logout() { localStorage.removeItem('uemail'); localStorage.removeItem('has_profile'); location.reload(); }

    async function load() {
        syncAuthUI();
        const hasProfile = localStorage.getItem('has_profile'), email = localStorage.getItem('uemail'), matched = localStorage.getItem('matched_cafe');
        if (hasProfile === 'true' && email) {
            document.getElementById('p-active').style.display = 'grid';
            document.getElementById('u-name').innerText = email.split('@')[0];
            document.getElementById('p-story').innerText = localStorage.getItem('p_story');
            const recs = JSON.parse(localStorage.getItem('p_recs') || '{}');
            document.getElementById('p-recs').innerText = `${recs.cafe} • ${recs.drink}`;
            new Chart(document.getElementById('p-chart'), { type: 'radar', data: { labels: ["Floral", "Fruity", "Sour", "Sweet", "Nutty", "Roasted"], datasets: [{ data: JSON.parse(localStorage.getItem('p_scores')), backgroundColor: 'rgba(212, 163, 115, 0.3)', borderColor: '#3d2b1f', borderWidth: 2 }] }, options: { scales: { r: { suggestedMax: 10, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        } else { document.getElementById('p-empty').style.display = 'block'; }

        const r = await fetch('./cafes.json'), cafes = await r.json(), grid = document.getElementById('stamp-grid');
        let count = 0; cafes.forEach(c => {
            const isCol = (hasProfile === 'true' && c.name === matched); if(isCol) count++;
            grid.innerHTML += `<div class="stamp ${isCol?'collected':''}"><div>${c.name}</div><small>${c.district}</small></div>`;
        });
        document.getElementById('stat-stamps').innerText = `${count} Stamps`;
    }
    window.onload = load;
</script>
</body>
</html>
